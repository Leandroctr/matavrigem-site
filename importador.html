<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Importador - Firebase</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #1b3a22 0%, #2c5c3a 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .card {
      background: #f6f2ea; border-radius: 12px; padding: 2rem;
      max-width: 600px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    h1 {
      font-family: 'Cormorant Garamond', serif; font-size: 2rem;
      color: #1b3a22; margin-bottom: .5rem;
    }
    .subtitle {
      font-size: .8rem; letter-spacing: .1em; text-transform: uppercase;
      color: #c8a84b; margin-bottom: 1.5rem;
    }
    textarea {
      width: 100%; padding: 1rem; border: 1px solid rgba(200,168,75,.3);
      border-radius: 6px; font-family: monospace; font-size: .9rem;
      min-height: 300px; resize: vertical; color: #252520; margin-bottom: 1rem;
    }
    textarea:focus { outline: none; border-color: #c8a84b; box-shadow: 0 0 0 3px rgba(200,168,75,.1); }
    .btn {
      width: 100%; padding: 1rem;
      background: linear-gradient(135deg, #1b3a22 0%, #2c5c3a 100%);
      color: #fff; border: none; border-radius: 6px; font-size: .85rem;
      letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
      transition: all .3s; font-weight: 500; margin-bottom: 1rem;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(27,58,34,.3); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .status {
      padding: 1rem; border-radius: 6px; margin-bottom: 1rem;
      font-size: .9rem; display: none; line-height: 1.6;
    }
    .status.show { display: block; }
    .status-success {
      background: rgba(37,211,102,.1); border: 1px solid rgba(37,211,102,.3); color: #1a7d4e;
    }
    .status-error {
      background: rgba(214,69,69,.1); border: 1px solid rgba(214,69,69,.3); color: #9a2c2c;
    }
    .status-loading {
      background: rgba(200,168,75,.1); border: 1px solid rgba(200,168,75,.3); color: #7a5230;
    }
    .info-box {
      background: rgba(200,168,75,.1); border: 1px solid rgba(200,168,75,.3);
      border-radius: 4px; padding: 1rem; margin-bottom: 1.5rem;
      font-size: .8rem; line-height: 1.6; color: #252520;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Importador de Dados</h1>
    <div class="subtitle">Firebase Firestore</div>

    <div class="info-box">
      ℹ️ Cole seu arquivo <strong>dados.json</strong> completo aqui. Todos os eventos, fotos, próxima gira e cursos serão importados para o Firebase.
    </div>

    <textarea id="jsonInput" placeholder="Cole aqui o conteúdo completo do seu dados.json"></textarea>

    <button class="btn" id="btnImportar" onclick="importarDados()">📥 Importar Dados</button>
    <div id="statusDiv" class="status"></div>

    <div style="text-align: center; font-size: .7rem; color: #56564e; margin-top: 1.5rem;">
      Após importar com sucesso, acesse <strong>admin.html</strong> para editar os dados.
    </div>
  </div>

  <script>
    // Variáveis globais
    let db = null;

    // Inicializar Firebase
    async function initFirebase() {
      const { initializeApp } = await import('https://www.gstatic.firebasecdn.com/9.22.2/firebase-app.js');
      const { getFirestore } = await import('https://www.gstatic.firebasecdn.com/9.22.2/firebase-firestore.js');

      const config = {
        apiKey: "AIzaSyCDt7n4hoxQlF0BRLWB_bBouO4A35YsZVY",
        authDomain: "mata-virgem.firebaseapp.com",
        projectId: "mata-virgem",
        storageBucket: "mata-virgem.firebasestorage.app",
        messagingSenderId: "351134240123",
        appId: "1:351134240123:web:86a041fee58b856ea3c1de"
      };

      console.log('🔥 Inicializando Firebase...');
      const app = initializeApp(config);
      db = getFirestore(app);
      console.log('✅ Firebase iniciado!');
    }

    // Chamar inicialização
    initFirebase();

    // ══ FUNÇÃO PRINCIPAL (GLOBAL) ══
    async function importarDados() {
      const jsonInput = document.getElementById('jsonInput').value.trim();
      const statusDiv = document.getElementById('statusDiv');
      const btnImportar = document.getElementById('btnImportar');

      if (!jsonInput) {
        mostrarStatus('❌ Cole o JSON antes de importar!', 'error');
        return;
      }

      btnImportar.disabled = true;
      mostrarStatus('⏳ Validando JSON...', 'loading');

      try {
        // Validar JSON
        const dados = JSON.parse(jsonInput);
        console.log('✅ JSON válido!');
        mostrarStatus('✅ JSON validado! Iniciando importação...', 'loading');

        // Importar funções necessárias
        const { collection, doc, setDoc, deleteDoc, getDocs } = await import('https://www.gstatic.firebasecdn.com/9.22.2/firebase-firestore.js');

        // Limpar dados antigos
        mostrarStatus('🗑️ Limpando dados antigos...', 'loading');
        
        console.log('🗑️ Deletando eventos antigos...');
        const eventosSnap = await getDocs(collection(db, 'eventos'));
        for (const docEvento of eventosSnap.docs) {
          await deleteDoc(docEvento.ref);
        }
        console.log('✅ Eventos antigos deletados');

        console.log('🗑️ Deletando fotos antigas...');
        const galeriaSnap = await getDocs(collection(db, 'galeria'));
        for (const docFoto of galeriaSnap.docs) {
          await deleteDoc(docFoto.ref);
        }
        console.log('✅ Fotos antigas deletadas');

        // Importar Eventos
        if (dados.eventos && Array.isArray(dados.eventos)) {
          mostrarStatus(`📝 Importando ${dados.eventos.length} eventos...`, 'loading');
          console.log(`📝 Importando ${dados.eventos.length} eventos`);
          
          for (const evento of dados.eventos) {
            const id = evento.id || Date.now().toString() + Math.random();
            await setDoc(doc(db, 'eventos', id), {
              dia: evento.dia || '',
              mes: evento.mes || '',
              semana: evento.semana || '',
              nome: evento.nome || '',
              hora: evento.hora || ''
            });
          }
          console.log(`✅ ${dados.eventos.length} eventos importados!`);
        }

        // Importar Próxima Gira
        if (dados.proximaGira && typeof dados.proximaGira === 'object') {
          mostrarStatus('🎭 Importando próxima gira...', 'loading');
          console.log('🎭 Importando próxima gira');
          
          await setDoc(doc(db, 'proximaGira', 'gira1'), {
            data: dados.proximaGira.data || '',
            dia: dados.proximaGira.dia || '',
            hora: dados.proximaGira.hora || '',
            nome: dados.proximaGira.nome || '',
            descricao: dados.proximaGira.descricao || '',
            imagem: dados.proximaGira.imagem || ''
          });
          console.log('✅ Próxima gira importada!');
        }

        // Importar Galeria
        if (dados.galeria && Array.isArray(dados.galeria)) {
          mostrarStatus(`📸 Importando ${dados.galeria.length} fotos...`, 'loading');
          console.log(`📸 Importando ${dados.galeria.length} fotos`);
          
          for (const foto of dados.galeria) {
            const id = foto.id || Date.now().toString() + Math.random();
            await setDoc(doc(db, 'galeria', id), {
              titulo: foto.titulo || '',
              url: foto.url || ''
            });
          }
          console.log(`✅ ${dados.galeria.length} fotos importadas!`);
        }

        // Importar Cursos
        if (dados.cursos && Array.isArray(dados.cursos)) {
          mostrarStatus('📚 Importando cursos...', 'loading');
          console.log('📚 Importando cursos');
          
          const aulas = (dados.cursos[0] && dados.cursos[0].aulas) ? dados.cursos[0].aulas : [];
          await setDoc(doc(db, 'cursos', 'curso1'), {
            aulas: aulas
          });
          console.log(`✅ Cursos importados! (${aulas.length} aulas)`);
        }

        // ✅ Sucesso!
        btnImportar.disabled = false;
        mostrarStatus('✅ ✅ ✅ IMPORTAÇÃO CONCLUÍDA COM SUCESSO! ✅ ✅ ✅\n\nVocê pode agora acessar admin.html para editar os dados!', 'success');
        console.log('═══════════════════════════════════════');
        console.log('🎉 IMPORTAÇÃO CONCLUÍDA!');
        console.log('═══════════════════════════════════════');
        
        // Limpar textarea após 3 segundos
        setTimeout(() => {
          document.getElementById('jsonInput').value = '';
        }, 3000);

      } catch (erro) {
        btnImportar.disabled = false;
        console.error('❌ ERRO NA IMPORTAÇÃO:', erro);
        console.error('Mensagem:', erro.message);
        
        let mensagem = erro.message;
        if (erro instanceof SyntaxError) {
          mensagem = 'JSON inválido! Verifique a sintaxe do arquivo.';
        }
        
        mostrarStatus(`❌ ERRO: ${mensagem}`, 'error');
      }
    }

    // ══ FUNÇÃO AUXILIAR ══
    function mostrarStatus(mensagem, tipo) {
      const statusDiv = document.getElementById('statusDiv');
      statusDiv.innerHTML = mensagem;
      statusDiv.className = `status show status-${tipo}`;
      console.log(`[${tipo.toUpperCase()}]`, mensagem);
    }

    console.log('✅ Importador carregado! Aguardando JSON...');
  </script>

</body>
</html>
