<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Aruanda de Mata Virgem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --verde:      #1b3a22;
      --verde-med:  #2c5c3a;
      --verde-cl:   #3d7a50;
      --dourado:    #c8a84b;
      --dourado-cl: #e2c97e;
      --marrom:     #7a5230;
      --marrom-cl:  #a87840;
      --creme:      #f6f2ea;
      --creme2:     #ede8de;
      --branco:     #ffffff;
      --preto:      #0a0a08;
      --preto-cl:   #1a1a16;
      --texto:      #252520;
      --texto-cl:   #56564e;
      --erro:       #e74c3c;
      --sucesso:    #27ae60;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--creme);
      color: var(--texto);
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--creme); }
    ::-webkit-scrollbar-thumb { background: var(--verde-med); border-radius: 3px; }

    /* ══ LOGIN ══ */
    #login-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--verde) 0%, var(--verde-med) 100%);
      opacity: 1;
      transition: opacity 0.3s, visibility 0.3s;
      visibility: visible;
    }

    #login-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .login-box {
      background: var(--branco);
      border-radius: 12px;
      padding: 3rem 2rem;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(27, 58, 34, 0.3);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      color: var(--verde);
      margin-bottom: 0.5rem;
    }

    .login-logo p {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dourado);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--texto-cl);
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid rgba(200, 168, 75, 0.3);
      border-radius: 6px;
      font-size: 0.95rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      background: var(--creme);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--dourado);
      box-shadow: 0 0 0 3px rgba(200, 168, 75, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      background: var(--verde);
      color: var(--branco);
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .login-btn:hover:not(:disabled) {
      background: var(--verde-med);
      transform: translateY(-2px);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-msg {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 6px;
      font-size: 0.8rem;
      text-align: center;
      display: none;
    }

    .login-msg.show { display: block; }
    .login-msg.erro { background: rgba(231, 76, 60, 0.1); color: var(--erro); }
    .login-msg.sucesso { background: rgba(39, 174, 96, 0.1); color: var(--sucesso); }

    /* ══ ADMIN CONTAINER ══ */
    #admin-screen {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s;
    }

    #admin-screen.active {
      opacity: 1;
      visibility: visible;
    }

    .admin-header {
      background: var(--verde);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 10px rgba(27, 58, 34, 0.15);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--branco);
    }

    .logout-btn {
      padding: 0.6rem 1.2rem;
      background: rgba(255, 255, 255, 0.15);
      color: var(--branco);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ══ TABS ══ */
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(200, 168, 75, 0.2);
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 1rem 1.5rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--texto-cl);
      cursor: pointer;
      transition: color 0.3s, border-color 0.3s;
    }

    .tab-btn.active {
      color: var(--verde);
      border-bottom-color: var(--dourado);
    }

    .tab-btn:hover { color: var(--verde); }

    /* ══ TAB CONTENT ══ */
    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ══ CARD ══ */
    .card {
      background: var(--branco);
      border: 1px solid rgba(200, 168, 75, 0.15);
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 2px 8px rgba(27, 58, 34, 0.05);
    }

    .card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--verde);
      margin-bottom: 1.5rem;
    }

    /* ══ FORM ══ */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .form-row.full {
      grid-template-columns: 1fr;
    }

    .form-group {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--texto-cl);
      margin-bottom: 0.6rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid rgba(200, 168, 75, 0.3);
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: 'Outfit', sans-serif;
      transition: border-color 0.3s;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
      font-family: 'Outfit', sans-serif;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--dourado);
      box-shadow: 0 0 0 3px rgba(200, 168, 75, 0.1);
    }

    /* ══ UPLOAD ══ */
    .upload-area {
      position: relative;
      border: 2px dashed rgba(200, 168, 75, 0.3);
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(200, 168, 75, 0.02);
    }

    .upload-area.dragover {
      border-color: var(--dourado);
      background: rgba(200, 168, 75, 0.08);
    }

    .upload-area input[type="file"] {
      display: none;
    }

    .upload-text {
      font-size: 0.95rem;
      color: var(--texto-cl);
      margin-bottom: 0.5rem;
    }

    .upload-text strong {
      color: var(--verde);
      display: block;
      margin-bottom: 0.3rem;
    }

    .upload-small {
      font-size: 0.8rem;
      color: var(--texto-cl);
    }

    .preview-img {
      margin-top: 1rem;
      max-width: 200px;
      max-height: 200px;
      border-radius: 6px;
      box-shadow: 0 4px 12px rgba(27, 58, 34, 0.1);
    }

    /* ══ BUTTON ══ */
    .btn-primary,
    .btn-secondary,
    .btn-danger {
      padding: 0.9rem 1.8rem;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: var(--verde);
      color: var(--branco);
    }

    .btn-primary:hover {
      background: var(--verde-med);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(27, 58, 34, 0.2);
    }

    .btn-secondary {
      background: rgba(200, 168, 75, 0.1);
      color: var(--dourado);
      border: 1px solid var(--dourado);
    }

    .btn-secondary:hover {
      background: rgba(200, 168, 75, 0.2);
    }

    .btn-danger {
      background: rgba(231, 76, 60, 0.1);
      color: var(--erro);
      border: 1px solid var(--erro);
    }

    .btn-danger:hover {
      background: rgba(231, 76, 60, 0.2);
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    /* ══ LISTA ══ */
    .item-list {
      margin-top: 2rem;
    }

    .item-card {
      background: var(--creme);
      border-left: 3px solid var(--dourado);
      padding: 1.5rem;
      margin-bottom: 1rem;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      transition: all 0.3s;
    }

    .item-card:hover {
      background: var(--branco);
      box-shadow: 0 2px 8px rgba(27, 58, 34, 0.08);
    }

    .item-info h3 {
      font-size: 1rem;
      color: var(--verde);
      margin-bottom: 0.3rem;
    }

    .item-info p {
      font-size: 0.85rem;
      color: var(--texto-cl);
      margin-bottom: 0.2rem;
    }

    .item-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-edit,
    .btn-delete {
      padding: 0.5rem 0.9rem;
      border: none;
      border-radius: 4px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-edit {
      background: rgba(200, 168, 75, 0.2);
      color: var(--dourado);
    }

    .btn-edit:hover {
      background: rgba(200, 168, 75, 0.4);
    }

    .btn-delete {
      background: rgba(231, 76, 60, 0.2);
      color: var(--erro);
    }

    .btn-delete:hover {
      background: rgba(231, 76, 60, 0.4);
    }

    /* ══ MESSAGE ══ */
    .message {
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      display: none;
    }

    .message.show { display: block; }
    .message.sucesso { background: rgba(39, 174, 96, 0.1); color: var(--sucesso); border-left: 3px solid var(--sucesso); }
    .message.erro { background: rgba(231, 76, 60, 0.1); color: var(--erro); border-left: 3px solid var(--erro); }
    .message.info { background: rgba(200, 168, 75, 0.1); color: var(--dourado); border-left: 3px solid var(--dourado); }

    /* ══ LOADING ══ */
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(200, 168, 75, 0.3);
      border-top-color: var(--dourado);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 768px) {
      .admin-container {
        padding: 1rem;
      }

      .admin-header {
        padding: 1rem;
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .card {
        padding: 1.5rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .tabs {
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .tab-btn {
        padding: 0.8rem 1rem;
        font-size: 0.7rem;
      }

      .item-card {
        flex-direction: column;
      }

      .item-actions {
        width: 100%;
        justify-content: flex-end;
      }

      .login-box {
        padding: 2rem 1.5rem;
      }
    }
  </style>

</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">
        <h1>Aruanda</h1>
        <p>Painel Administrativo</p>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="seu@email.com" required/>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required/>
        </div>

        <button type="submit" class="login-btn" id="login-btn">Entrar</button>

        <div id="login-msg" class="login-msg"></div>
      </form>
    </div>
  </div>

  <!-- ADMIN SCREEN -->
  <div id="admin-screen">
    <div class="admin-header">
      <h1>Painel Administrativo</h1>
      <button class="logout-btn" onclick="handleLogout()">Sair</button>
    </div>

    <div class="admin-container">
      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('proximaGira')">📅 Próxima Gira</button>
        <button class="tab-btn" onclick="switchTab('eventos')">🗓️ Eventos</button>
        <button class="tab-btn" onclick="switchTab('galeria')">🖼️ Galeria</button>
      </div>

      <!-- ══ PRÓXIMA GIRA ══ -->
      <div id="proximaGira" class="tab-content active">
        <div class="card">
          <h2>Próxima Gira</h2>
          <div id="proximaMsgForm" class="message"></div>

          <form id="proximaForm" onsubmit="salvarProxima(event)">
            <div class="form-row">
              <div class="form-group">
                <label>Nome da Gira</label>
                <input type="text" id="proximaNome" placeholder="Ex: Gira de Caboclo" required/>
              </div>
              <div class="form-group">
                <label>Data</label>
                <input type="text" id="proximaData" placeholder="Ex: 15 de Maio" required/>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Dia da Semana</label>
                <input type="text" id="proximaDia" placeholder="Ex: Segunda-feira" required/>
              </div>
              <div class="form-group">
                <label>Horário</label>
                <input type="text" id="proximaHora" placeholder="Ex: 20h30" required/>
              </div>
            </div>

            <div class="form-row full">
              <div class="form-group">
                <label>Descrição</label>
                <textarea id="proximaDescricao" placeholder="Descreva a gira..." required></textarea>
              </div>
            </div>

            <div class="form-row full">
              <div class="form-group">
                <label>Imagem</label>
                <div class="upload-area" id="proximaUploadArea" ondrop="handleDropProxima(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                  <input type="file" id="proximaImagem" accept="image/*" onchange="previewProxima(event)"/>
                  <div class="upload-text">
                    <strong>Clique ou arraste a imagem</strong>
                    <span class="upload-small">PNG, JPG (máx. 5MB)</span>
                  </div>
                  <img id="proximaPreview" class="preview-img" style="display:none;"/>
                </div>
              </div>
            </div>

            <div class="btn-group">
              <button type="submit" class="btn-primary">Salvar Próxima Gira</button>
              <button type="reset" class="btn-secondary">Limpar</button>
            </div>
          </form>
        </div>
      </div>

      <!-- ══ EVENTOS ══ -->
      <div id="eventos" class="tab-content">
        <div class="card">
          <h2>Adicionar Evento</h2>
          <div id="eventoMsgForm" class="message"></div>

          <form id="eventoForm" onsubmit="salvarEvento(event)">
            <div class="form-row">
              <div class="form-group">
                <label>Nome do Evento</label>
                <input type="text" id="eventoNome" placeholder="Ex: Gira de Iansã" required/>
              </div>
              <div class="form-group">
                <label>Dia</label>
                <input type="number" id="eventoDia" placeholder="Ex: 15" min="1" max="31" required/>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Mês</label>
                <input type="text" id="eventoMes" placeholder="Ex: mai" required/>
              </div>
              <div class="form-group">
                <label>Dia da Semana</label>
                <input type="text" id="eventoSemana" placeholder="Ex: segunda-feira" required/>
              </div>
            </div>

            <div class="form-row full">
              <div class="form-group">
                <label>Horário</label>
                <input type="text" id="eventoHora" placeholder="Ex: 20h30" required/>
              </div>
            </div>

            <div class="btn-group">
              <button type="submit" class="btn-primary">Adicionar Evento</button>
              <button type="reset" class="btn-secondary">Limpar</button>
            </div>
          </form>

          <div class="item-list" id="eventosList"></div>
        </div>
      </div>

      <!-- ══ GALERIA ══ -->
      <div id="galeria" class="tab-content">
        <div class="card">
          <h2>Adicionar Foto</h2>
          <div id="galeriaMsgForm" class="message"></div>

          <form id="galeriaForm" onsubmit="salvarFoto(event)">
            <div class="form-row full">
              <div class="form-group">
                <label>Título da Foto</label>
                <input type="text" id="galeriaTitle" placeholder="Ex: Gira de Oxum" required/>
              </div>
            </div>

            <div class="form-row full">
              <div class="form-group">
                <label>Imagem</label>
                <div class="upload-area" id="galeriaUploadArea" ondrop="handleDropGaleria(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                  <input type="file" id="galeriaImagem" accept="image/*" onchange="previewGaleria(event)"/>
                  <div class="upload-text">
                    <strong>Clique ou arraste a imagem</strong>
                    <span class="upload-small">PNG, JPG (máx. 5MB)</span>
                  </div>
                  <img id="galeriaPreview" class="preview-img" style="display:none;"/>
                </div>
              </div>
            </div>

            <div class="btn-group">
              <button type="submit" class="btn-primary">Adicionar Foto</button>
              <button type="reset" class="btn-secondary">Limpar</button>
            </div>
          </form>

          <div class="item-list" id="galeriaList"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- FIREBASE SCRIPTS -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      signOut, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { 
      getFirestore, 
      collection, 
      addDoc, 
      updateDoc, 
      deleteDoc, 
      doc, 
      getDocs, 
      query, 
      orderBy,
      onSnapshot,
      writeBatch 
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";
    import { 
      getStorage, 
      ref, 
      uploadBytes, 
      getDownloadURL 
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-storage.js";

    // ══ Firebase Config ══
    const firebaseConfig = {
      apiKey: "AIzaSyCDt7n4hoxQlF0BRLWB_bBouO4A35YsZVY",
      authDomain: "mata-virgem.firebaseapp.com",
      projectId: "mata-virgem",
      storageBucket: "mata-virgem.firebasestorage.app",
      messagingSenderId: "351134240123",
      appId: "1:351134240123:web:86a041fee58b856ea3c1de"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // ══ Global State ══
    window.currentUser = null;
    window.proximaData = null;
    window.eventosData = [];
    window.galeriaData = [];

    // ══ AUTH ══
    window.handleLogin = async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const msg = document.getElementById('login-msg');

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';
      msg.classList.remove('show', 'erro', 'sucesso');

      try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        window.currentUser = result.user;
        showMessage(msg, 'Entrando...', 'sucesso');

        setTimeout(() => {
          document.getElementById('login-screen').classList.add('hidden');
          document.getElementById('admin-screen').classList.add('active');
          carregarDados();
        }, 500);

      } catch (error) {
        console.error('Erro login:', error);
        showMessage(msg, 'Email ou senha incorretos', 'erro');
        btn.disabled = false;
        btn.innerHTML = 'Entrar';
      }
    };

    window.handleLogout = async function() {
      await signOut(auth);
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('admin-screen').classList.remove('active');
      document.getElementById('login-form').reset();
      window.currentUser = null;
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.currentUser = user;
      }
    });

    // ══ TABS ══
    window.switchTab = function(tabName) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    };

    // ══ UPLOAD DRAG&DROP ══
    window.handleDragOver = function(e) {
      e.preventDefault();
      e.currentTarget.classList.add('dragover');
    };

    window.handleDragLeave = function(e) {
      e.currentTarget.classList.remove('dragover');
    };

    window.handleDropProxima = function(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        document.getElementById('proximaImagem').files = files;
        previewProxima({ target: { files } });
      }
    };

    window.handleDropGaleria = function(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        document.getElementById('galeriaImagem').files = files;
        previewGaleria({ target: { files } });
      }
    };

    // ══ PREVIEW ══
    window.previewProxima = function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('proximaPreview').src = ev.target.result;
        document.getElementById('proximaPreview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    };

    window.previewGaleria = function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('galeriaPreview').src = ev.target.result;
        document.getElementById('galeriaPreview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    };

    // ══ HELPER FUNCTIONS ══
    function showMessage(element, text, type) {
      element.textContent = text;
      element.className = 'message show ' + type;
      setTimeout(() => {
        element.classList.remove('show');
      }, 4000);
    }

    async function uploadImagem(file, path) {
      if (!file) return null;
      const storageRef = ref(storage, path);
      await uploadBytes(storageRef, file);
      return await getDownloadURL(storageRef);
    }

    // ══ PRÓXIMA GIRA ══
    window.salvarProxima = async function(e) {
      e.preventDefault();

      const btn = e.target.querySelector('.btn-primary');
      const msg = document.getElementById('proximaMsgForm');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';

      try {
        let imagemUrl = document.getElementById('proximaImagem').dataset.url || null;

        if (document.getElementById('proximaImagem').files.length > 0) {
          imagemUrl = await uploadImagem(
            document.getElementById('proximaImagem').files[0],
            'proximaGira/proxima.jpg'
          );
        }

        const dados = {
          nome: document.getElementById('proximaNome').value,
          data: document.getElementById('proximaData').value,
          dia: document.getElementById('proximaDia').value,
          hora: document.getElementById('proximaHora').value,
          descricao: document.getElementById('proximaDescricao').value,
          imagem: imagemUrl,
          updated: new Date()
        };

        // Atualizar ou criar
        const snapshot = await getDocs(collection(db, 'proximaGira'));
        if (!snapshot.empty) {
          await updateDoc(doc(db, 'proximaGira', snapshot.docs[0].id), dados);
        } else {
          await addDoc(collection(db, 'proximaGira'), dados);
        }

        showMessage(msg, '✓ Próxima gira salva com sucesso!', 'sucesso');
        document.getElementById('proximaForm').reset();
        document.getElementById('proximaPreview').style.display = 'none';

      } catch (error) {
        console.error('Erro:', error);
        showMessage(msg, '✗ Erro ao salvar. Tente novamente.', 'erro');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Salvar Próxima Gira';
      }
    };

    // ══ EVENTOS ══
    window.salvarEvento = async function(e) {
      e.preventDefault();

      const btn = e.target.querySelector('.btn-primary');
      const msg = document.getElementById('eventoMsgForm');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';

      try {
        const dados = {
          nome: document.getElementById('eventoNome').value,
          dia: parseInt(document.getElementById('eventoDia').value),
          mes: document.getElementById('eventoMes').value.toLowerCase(),
          semana: document.getElementById('eventoSemana').value,
          hora: document.getElementById('eventoHora').value,
          created: new Date()
        };

        await addDoc(collection(db, 'eventos'), dados);

        showMessage(msg, '✓ Evento adicionado com sucesso!', 'sucesso');
        document.getElementById('eventoForm').reset();

      } catch (error) {
        console.error('Erro:', error);
        showMessage(msg, '✗ Erro ao adicionar evento.', 'erro');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Adicionar Evento';
      }
    };

    window.deletarEvento = async function(id) {
      if (!confirm('Tem certeza que deseja deletar este evento?')) return;

      try {
        await deleteDoc(doc(db, 'eventos', id));
        showMessage(
          document.getElementById('eventoMsgForm'),
          '✓ Evento deletado com sucesso!',
          'sucesso'
        );
      } catch (error) {
        console.error('Erro:', error);
        showMessage(
          document.getElementById('eventoMsgForm'),
          '✗ Erro ao deletar evento.',
          'erro'
        );
      }
    };

    // ══ GALERIA ══
    window.salvarFoto = async function(e) {
      e.preventDefault();

      const btn = e.target.querySelector('.btn-primary');
      const msg = document.getElementById('galeriaMsgForm');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';

      try {
        const imagemUrl = await uploadImagem(
          document.getElementById('galeriaImagem').files[0],
          `galeria/${Date.now()}.jpg`
        );

        const dados = {
          titulo: document.getElementById('galeriaTitle').value,
          url: imagemUrl,
          created: new Date()
        };

        await addDoc(collection(db, 'galeria'), dados);

        showMessage(msg, '✓ Foto adicionada com sucesso!', 'sucesso');
        document.getElementById('galeriaForm').reset();
        document.getElementById('galeriaPreview').style.display = 'none';

      } catch (error) {
        console.error('Erro:', error);
        showMessage(msg, '✗ Erro ao adicionar foto.', 'erro');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Adicionar Foto';
      }
    };

    window.deletarFoto = async function(id) {
      if (!confirm('Tem certeza que deseja deletar esta foto?')) return;

      try {
        await deleteDoc(doc(db, 'galeria', id));
        showMessage(
          document.getElementById('galeriaMsgForm'),
          '✓ Foto deletada com sucesso!',
          'sucesso'
        );
      } catch (error) {
        console.error('Erro:', error);
        showMessage(
          document.getElementById('galeriaMsgForm'),
          '✗ Erro ao deletar foto.',
          'erro'
        );
      }
    };

    // ══ CARREGAR DADOS ══
    function carregarDados() {
      // Eventos
      const qEventos = query(collection(db, 'eventos'), orderBy('dia', 'asc'));
      onSnapshot(qEventos, (snapshot) => {
        window.eventosData = [];
        const html = [];
        
        snapshot.forEach((doc) => {
          const e = doc.data();
          window.eventosData.push({ id: doc.id, ...e });
          
          html.push(`
            <div class="item-card">
              <div class="item-info">
                <h3>${e.nome}</h3>
                <p>📅 ${e.dia} de ${e.mes}</p>
                <p>🕗 ${e.hora} • ${e.semana}</p>
              </div>
              <div class="item-actions">
                <button class="btn-delete" onclick="deletarEvento('${doc.id}')">Deletar</button>
              </div>
            </div>
          `);
        });

        document.getElementById('eventosList').innerHTML = html.join('') || '<p style="color: var(--texto-cl); text-align: center; padding: 2rem;">Nenhum evento cadastrado</p>';
      });

      // Galeria
      const qGaleria = query(collection(db, 'galeria'), orderBy('created', 'desc'));
      onSnapshot(qGaleria, (snapshot) => {
        window.galeriaData = [];
        const html = [];

        snapshot.forEach((doc) => {
          const f = doc.data();
          window.galeriaData.push({ id: doc.id, ...f });

          html.push(`
            <div class="item-card">
              <div class="item-info">
                <h3>${f.titulo}</h3>
                <p style="word-break: break-all;">🔗 ${f.url.substring(0, 50)}...</p>
              </div>
              <div class="item-actions">
                <button class="btn-delete" onclick="deletarFoto('${doc.id}')">Deletar</button>
              </div>
            </div>
          `);
        });

        document.getElementById('galeriaList').innerHTML = html.join('') || '<p style="color: var(--texto-cl); text-align: center; padding: 2rem;">Nenhuma foto cadastrada</p>';
      });
    }
  </script>

</body>
</html>
