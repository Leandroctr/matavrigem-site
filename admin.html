const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// cria tela de login
function mostrarLogin() {
  const overlay = document.createElement("div");
  overlay.style.position = "fixed";
  overlay.style.top = "0";
  overlay.style.left = "0";
  overlay.style.width = "100%";
  overlay.style.height = "100%";
  overlay.style.background = "#0f172a";
  overlay.style.display = "flex";
  overlay.style.justifyContent = "center";
  overlay.style.alignItems = "center";
  overlay.style.zIndex = "9999";
  overlay.style.color = "#fff";

  overlay.innerHTML = `
    <div style="background:#1e293b;padding:30px;border-radius:10px;text-align:center">
      <h2>Painel Admin</h2>
      <input id="email" placeholder="Email" style="display:block;margin:10px;padding:10px;width:220px">
      <input id="senha" type="password" placeholder="Senha" style="display:block;margin:10px;padding:10px;width:220px">
      <button id="btnLogin" style="padding:10px;background:#22c55e;border:none;color:#fff;width:100%">Entrar</button>
      <p id="erro" style="color:red"></p>
    </div>
  `;

  document.body.appendChild(overlay);

  document.getElementById("btnLogin").onclick = function() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    signInWithEmailAndPassword(auth, email, senha)
      .then(() => location.reload())
      .catch((error) => {
        document.getElementById("erro").innerText = error.message;
      });
  };
}

      carregarDados();
    }
  } else {
    mostrarLogin();
  }
});
</script>
